name: keep-alive

# Pings the Render free-tier backend so it doesn't sleep (it idles out after
# ~15 min). GitHub's cron is best-effort and often runs late, so this is a
# helper, NOT a guarantee — for judging day also set up an external monitor
# (e.g. UptimeRobot on https://codoctor-api.onrender.com/health every 5 min),
# which is more punctual. Note: this only prevents *sleep*; a Render restart
# still clears the in-memory live sessions.

on:
  schedule:
    - cron: "*/10 * * * *" # every ~10 minutes (best-effort)
  workflow_dispatch: {} # allow a manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake the backend
        run: |
          for i in 1 2 3; do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 90 \
              https://codoctor-api.onrender.com/health) && { echo "health: $code"; exit 0; }
            echo "attempt $i failed, retrying in 20s..."; sleep 20
          done
          echo "backend did not respond"; exit 1
